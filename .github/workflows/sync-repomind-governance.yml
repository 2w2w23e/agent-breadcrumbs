name: One-time sync RepoMind governance

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SOURCE_REPO: 2w2w23e/RepoMind-OS
      SOURCE_REF: main
      SOURCE_DIR: template/.ai-governance
      DEST_DIR: .ai-governance
      TARGET_BRANCH: main

    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          path: target
          ref: ${{ env.TARGET_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          path: source

      - name: Replace target repository content
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "source/${SOURCE_DIR}" ]; then
            echo "ERROR: source/${SOURCE_DIR} does not exist." >&2
            exit 1
          fi

          cd target

          echo "Clearing target repository contents..."
          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          echo "Copying source/${SOURCE_DIR} to ${DEST_DIR}..."
          mkdir -p "${DEST_DIR}"
          cp -a "../source/${SOURCE_DIR}/." "${DEST_DIR}/"

          echo "Resulting files:"
          find . -maxdepth 5 -type f | sort

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Sync .ai-governance from RepoMind-OS"
          git push origin "HEAD:${TARGET_BRANCH}"